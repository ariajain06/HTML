<!DOCTYPE html>

<html lang="en">

<head>

<title>Bootstrap Example</title>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

</head>
<body>
    <div class="container">
        <h2>Carouser Example</h2>
        <div id="myCarouserl" class="carousel slide" data-ride="carousel">
            <!--Indicator-->
            <ol class="carousel indicators">
                <li data-target="myCarousel" data-slide-to="0" class="active"></li>
                <li data-target="myCarousel" data-slide-to="1"></li>
                <li data-target="myCarousel" data-slide-to="2"></li>
            </ol>
            <!--Wrapper for slides-->
            <div class="carousel-inner">
                <div class="item active">
                    <img src="cheesecake.jpg"alt="Image 1"> 
                </div>
                <div class="item">
                    <img src="flower.jpg"alt="Image 2"> 
            </div>
            <div class="item">
                    <img src="penguin.jpg"alt="Penguin"> 
        </div>
    </div>
    <!--Left and right controls-->
    <a class="left carousel-control" href="" data-slide="prev">
        <span class="glphicon glphicon-chevron-left"></span>
 <span class="sr-only">Previous</span>
    </a>
        <a class="right carousel-control" href="" data-slide="next">
        <span class="glphicon glphicon-chevron-right"></span>
 <span class="sr-only">Next</span>
        </a>
        </div>
    </div>
</body>
</html>
